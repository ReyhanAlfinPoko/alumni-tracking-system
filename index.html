<!DOCTYPE html>
<html>
<head>

<title>Sistem Pelacakan Alumni</title>

</head>

<body>

<h1>Sistem Pelacakan Alumni</h1>

<div class="form">

<ul id="listAlumni"></ul>

<script src="script.js"></script>

</body>
</html>
